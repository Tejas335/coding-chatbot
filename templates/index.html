<!DOCTYPE html>
<html>
<head>
    <title>Coding Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <h2>CHATBOT</h2>

    <div id="chat-box"></div>

    <div class="input-area">
        <textarea id="user-input" placeholder="Ask coding question..." rows="2"></textarea>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let inputField = document.getElementById("user-input");
    let input = inputField.value;

    if (input.trim() === "") return;

    let chatBox = document.getElementById("chat-box");

    // Show user message
    chatBox.innerHTML += "<div class='user'>You: " + input + "</div>";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: input })
    })
    .then(response => response.json())
.then(data => {
    let chatBox = document.getElementById("chat-box");

    let botDiv = document.createElement("div");
    botDiv.className = "bot";

    let reply = data.reply;

    // 🔥 Detect and format code
    if (reply.includes("#include") || reply.includes("int main")) {
        reply = reply.replace(/(#include[\s\S]+)/, function(match) {
            return "<pre><code>" + match + "</code></pre>";
        });
    }

    // convert new lines
    reply = reply.replace(/\n/g, "<br>");

    botDiv.innerHTML = reply;

    chatBox.appendChild(botDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
})
    .catch(error => {
        console.error("Error:", error);
        chatBox.innerHTML += "<div class='bot'>Bot: Error occurred</div>";
    });

    inputField.value = "";
}
    document.getElementById("user-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault(); // stop new line
            sendMessage();      // send message
        }
    });
</script>

</body>
</html>
